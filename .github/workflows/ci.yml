name: Tests & Deploy to Main

on:
  push:
    branches:
      - source
  pull_request:
    branches:
      - source

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Deploy to main (without solution files)
        if: success() && github.ref == 'refs/heads/source'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main

          # Удаляем package-lock.json который создал npm install
          rm -f package-lock.json

          # Переключаемся на main
          git checkout -f main

          # Берём все файлы из source кроме ненужных
          git checkout source -- README.md package.json solution.js solution.test.js .github/workflows/ci.yml

          git add -A
          git diff --staged --quiet || git commit -m "Deploy from source [skip ci]"
          git push origin main
