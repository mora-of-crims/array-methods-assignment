name: Tests & Deploy to Main

on:
  push:
    branches:
      - source
  pull_request:
    branches:
      - source

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Deploy to main (without solution files)
        if: success() && github.ref == 'refs/heads/source'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir /tmp/deploy

          rsync -av \
            --exclude='solution.answer.js' \
            --exclude='node_modules' \
            --exclude='.git' \
            . /tmp/deploy/

          git fetch origin main
          git clean -fd
          git checkout -f main

          git rm -rf . || true
          rsync -av /tmp/deploy/ .

          git add -A
          git diff --staged --quiet || git commit -m "Deploy from source [skip ci]"
          git push origin main
